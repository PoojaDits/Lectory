<svg width="600" height="700" viewBox="0 0 600 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="700" fill="#3f2a1e"/>
  
  <!-- Decorative shapes - Amber theme -->
  <circle cx="120" cy="180" r="95" fill="#8B5E3C" opacity="0.6"/>
  <circle cx="480" cy="140" r="65" fill="#D97757" opacity="0.5"/>
  <ellipse cx="85" cy="420" rx="70" ry="45" fill="#B45309" opacity="0.4"/>
  
  <!-- Stars -->
  <circle cx="200" cy="95" r="3" fill="#FCD34D"/>
  <circle cx="340" cy="70" r="2" fill="#FCD34D"/>
  <circle cx="450" cy="200" r="2.5" fill="#FCD34D"/>
  <circle cx="95" cy="280" r="2" fill="#FCD34D"/>
  
  <!-- Tablet frame -->
  <rect x="130" y="180" width="340" height="420" rx="35" fill="#451A03"/>
  <rect x="145" y="195" width="310" height="390" rx="22" fill="#78350F"/>
  
  <!-- Screen content - warm reading scene -->
  <rect x="160" y="210" width="280" height="360" rx="15" fill="#FEF3C7"/>
  
  <!-- Person reading on tablet -->
  <!-- Hair -->
  <path d="M230 265 Q260 235 310 255 Q325 285 315 320" fill="#451A03"/>
  
  <!-- Head -->
  <ellipse cx="275" cy="280" rx="32" ry="38" fill="#FDE68A"/>
  
  <!-- Glasses -->
  <ellipse cx="258" cy="275" rx="14" ry="10" fill="none" stroke="#78350F" stroke-width="2"/>
  <ellipse cx="295" cy="275" rx="14" ry="10" fill="none" stroke="#78350F" stroke-width="2"/>
  <line x1="272" y1="275" x2="281" y2="275" stroke="#78350F" stroke-width="2"/>
  
  <!-- Body -->
  <path d="M245 315 Q275 340 320 318" fill="#B45309"/>
  <rect x="242" y="315" width="75" height="95" rx="12" fill="#92400E"/>
  
  <!-- Arms -->
  <ellipse cx="235" cy="355" rx="14" ry="38" fill="#FDE68A" transform="rotate(-25 235 355)"/>
  <ellipse cx="335" cy="360" rx="14" ry="32" fill="#FDE68A" transform="rotate(30 335 360)"/>
  
  <!-- Book/Tablet content -->
  <rect x="265" y="335" width="85" height="110" rx="6" fill="#FEF3C7"/>
  <rect x="275" y="350" width="65" height="8" rx="2" fill="#92400E"/>
  <rect x="275" y="368" width="65" height="8" rx="2" fill="#92400E"/>
  <rect x="275" y="386" width="45" height="8" rx="2" fill="#92400E"/>
  
  <!-- Legs -->
  <ellipse cx="265" cy="455" rx="22" ry="55" fill="#92400E" transform="rotate(-15 265 455)"/>
  <ellipse cx="310" cy="465" rx="20" ry="48" fill="#92400E" transform="rotate(18 310 465)"/>
  
  <!-- Coffee cup -->
  <rect x="195" y="420" width="32" height="28" rx="4" fill="#451A03"/>
  <ellipse cx="211" cy="420" rx="16" ry="5" fill="#78350F"/>
  
  <!-- Decorative planets -->
  <circle cx="95" cy="95" r="22" fill="#D97757"/>
  <circle cx="480" cy="480" r="28" fill="#B45309"/>
  <ellipse cx="505" cy="510" rx="12" ry="4" fill="#92400E"/>
  
